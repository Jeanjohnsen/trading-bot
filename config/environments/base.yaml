app:
  name: POLY-ARB AGENT
  mode: paper
  base_url: http://127.0.0.1:8000
  bootstrap_demo_data: true
  enable_research_mode: false
  enable_live_trading: false
  enable_market_orders: false
scanner:
  refresh_seconds: 20
  max_markets: 80
  max_orderbook_levels: 5
  stale_data_timeout_seconds: 20
  min_minutes_to_expiry: 30
  max_days_to_expiry: 120
risk:
  min_net_edge: 0.015
  research_signal_min_edge: 0.012
  research_signal_min_net_edge: 0.004
  max_position_bankroll_fraction: 0.05
  max_concurrent_positions: 15
  max_drawdown_fraction: 0.08
  daily_loss_limit_fraction: 0.03
  total_exposure_fraction: 0.40
  slippage_tolerance: 0.01
  min_liquidity_score: 0.35
  api_budget_daily_usd: 12.0
  fractional_kelly: 0.25
  trade_size_presets: [0.02, 0.05, 0.10]
  execution_risk_buffer: 0.005
  fee_rate: 0.0
  latency_buffer: 0.002
  estimated_claude_cost_per_trade_usd: 0.02
notifications:
  enable_webhook: false
  enable_discord: false
  enable_telegram: false
